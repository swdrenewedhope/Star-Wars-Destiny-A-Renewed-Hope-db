services:
  app:
    user: "0:0"
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "80:80"
    environment:
      SYMFONY_ENV: "prod"
      SYMFONY_DEBUG: "0"

      DB_HOST: "db"
      DB_PORT: "3306"
      DB_NAME: "swddb"
      DB_USER: "swddb"
      DB_PASSWORD: "swddbpass"

      MAILER_HOST: "localhost"
      MAILER_USER: "dev"

      CREATE_DEV_ADMIN: "1"
      DEV_ADMIN_USER: "dev"
      DEV_ADMIN_EMAIL: "dev@localhost"
      DEV_ADMIN_PASS: "dev"

      NODE_BIN: "/usr/local/bin/node"
      HANDLEBARS_BIN: "/var/www/html/node_modules/handlebars/bin/handlebars"

      SKIP_IMPORT: "0"

      WEBSITE_URL: "localhost"
      WEBSITE_NAME: "dev"
      GAME_NAME: "dev"
      PUBLISHER_NAME: "dev"
      EMAIL_SENDER_ADDRESS: "noreply@localhost"
      EMAIL_SENDER_NAME: "dev"
      SECRET: "dev"

      HAPPYR_MESSAGES_API_KEY: ""
      HAPPYR_VALIDATORS_API_KEY: ""

    volumes:
      - ./:/var/www/html
    
    depends_on:
      - db

  db:
    image: mysql:5.7
    command: --character-set-server=utf8 --collation-server=utf8_general_ci --sql-mode="ONLY_FULL_GROUP_BY,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_AUTO_CREATE_USER,NO_ENGINE_SUBSTITUTION"
    environment:
      MYSQL_DATABASE: "swddb"
      MYSQL_USER: "swddb"
      MYSQL_PASSWORD: "swddbpass"
      MYSQL_ROOT_PASSWORD: "rootpass"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
